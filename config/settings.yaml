{
  "project": {
    "name": "taiwan-stock-radar",
    "display_name": "Taiwan Stock Radar",
    "plan_version": "v1.3",
    "mode": "single_stock_strategy_council"
  },
  "analysis": {
    "primary_scope": "single_stock",
    "default_horizon": "swing",
    "supported_horizons": [
      "tactical",
      "swing",
      "position"
    ],
    "strategy_engine": "multi_strategy_weighted_committee",
    "supported_strategy_families": [
      "trend_following",
      "relative_strength_leadership",
      "breakout_confirmation",
      "pullback_continuation",
      "volatility_contraction_expansion",
      "tactical_mean_reversion"
    ]
  },
  "council": {
    "enabled": true,
    "default_agent_count": 8,
    "consensus_threshold": 0.68,
    "dissent_threshold": 0.24,
    "persona_config_path": "config/agent_personas.yaml",
    "strategy_module_config_path": "config/strategy_modules.yaml",
    "evaluation_metric_config_path": "config/evaluation_metrics.yaml"
  },
  "validation": {
    "enabled": true,
    "require_strategy_selection": true,
    "require_validation_panel": true,
    "minimum_trade_count": 30,
    "minimum_profit_factor": 1.15,
    "minimum_deflated_sharpe_ratio": 0.55
  },
  "scan": {
    "production_target_universe_size": 1800,
    "top_n": 20,
    "deep_dive_top_k": 3,
    "default_horizon": "swing",
    "legacy_demo_mode": true
  },
  "market": {
    "default_regime": "sideways",
    "market_score_by_regime": {
      "bull": 0.9,
      "sideways": 0.6,
      "bear": 0.3,
      "high_volatility": 0.4
    }
  },
  "paths": {
    "output_dir": "output"
  },
  "app": {
    "title": "Taiwan Stock Radar",
    "subtitle": "Strategy-enhanced single-stock Taiwan equity committee with legacy scan demo support"
  }
}
